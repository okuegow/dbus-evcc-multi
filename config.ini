# dbus-evcc-multi - Auto-discovery EVCC bridge for Victron Venus OS
#
# Pollt EVCC's /api/state und exponiert ALLE Loadpoints automatisch als
# je eigene com.victronenergy.evcharger-Services. Kein pro-Loadpoint-Setup.

[DEFAULT]
# Polling-Intervall in Sekunden (passt zu EVCC's interval)
PollSeconds = 15

# Wertebereich für dynamisch vergebene DeviceInstances (40-59 empfohlen).
# Stabile Zuordnung wird in state.json gespeichert.
DeviceInstanceRangeStart = 40
DeviceInstanceRangeEnd = 59

[ONPREMISE]
# IP/Hostname + Port der EVCC-Instanz auf separatem Host.
# Beispiel: Host = 192.168.1.50:7070
# Solange leer/falsch: Service läuft, Bridge wartet, Loop spammt das Log
# einmal pro Poll mit einem WARNING "EVCC unreachable" (kein Crash).
Host =

[VRM_TUNNEL]
# EVCC-UI ueber den VRM-"Bedienfeld"-Button erreichbar machen (ohne VPN).
# Default AUS -> Bridge verhaelt sich exakt wie ohne Tunnel ("EVCC REST API").
# Bei Enabled = true wird JEDER Loadpoint mit /Mgmt/Connection =
# "Modbus TCP <AdvertiseIp>" publiziert; der separate Service dbus-vrm-tunnel
# muss dann ebenfalls laufen.
Enabled = false

# Non-Loopback-IP, die VRM auf :80 antunnelt. KEINE 127.x-Adresse.
#   On-Cerbo: die LAN-IP des Cerbo selbst (z.B. 172.20.4.135)
#   Remote:   die LAN-IP des EVCC-Hosts (z.B. 172.20.4.90)
AdvertiseIp =

# Wohin der Rewrite-Proxy weiterleitet (die echte EVCC-UI).
#   On-Cerbo: 127.0.0.1:7070
#   Remote:   <evcc-host>:7070
EvccTarget = 127.0.0.1:7070

# Lokaler Port des Rewrite-Proxys (DNAT-Ziel von <AdvertiseIp>:80).
ProxyPort = 8099
